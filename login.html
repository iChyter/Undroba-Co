 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Iniciar Sesión - Undroba Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Geologica', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Left Panel - Gradient */
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #1a0a0a 0%, #0a0a0a 50%, #000000 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      overflow: hidden;
    }

    /* Gradient blur effects */
    .login-left::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 30% 20%, rgba(229, 57, 53, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(139, 0, 0, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .left-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 4rem;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: #E53935;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .left-content {
      width: 100%;
    }

    .left-subtitle {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .left-title {
      font-size: 2.75rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }

    .left-title span {
      color: #E53935;
    }

    .left-description {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
    }

    /* Right Panel - Form */
    .login-right {
      flex: 1;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      position: relative;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      margin-bottom: 2.5rem;
    }

    .login-icon {
      width: 48px;
      height: 48px;
      background: rgba(229, 57, 53, 0.1);
      border: 1px solid rgba(229, 57, 53, 0.2);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .login-icon svg {
      width: 24px;
      height: 24px;
      color: #E53935;
    }

    .login-title {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .login-subtitle {
      font-size: 0.9375rem;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.5;
    }

    .login-form {
      width: 100%;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.875rem 1rem;
      color: #fff;
      font-size: 0.9375rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #E53935;
      box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.1);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    /* Toggle password visibility */
    .toggle-password {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
    }

    .btn-login {
      width: 100%;
      background: #E53935;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 0.9375rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background: #ff5252;
      box-shadow: 0 0 20px rgba(229, 57, 53, 0.3);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 5px;
      padding: 0.875rem;
      margin-bottom: 1rem;
      color: #ef4444;
      font-size: 0.875rem;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      body {
        flex-direction: column;
      }

      .login-left {
        min-height: auto;
        padding: 2.5rem 2rem;
      }

      .left-wrapper {
        max-width: 100%;
      }

      .brand-logo {
        margin-bottom: 2rem;
      }

      .left-title {
        font-size: 2rem;
      }

      .login-right {
        padding: 2.5rem 2rem;
      }
    }

    @media (max-width: 640px) {
      .login-left {
        display: none;
      }

      .login-right {
        padding: 2rem 1.5rem;
        justify-content: center;
      }

      .login-title {
        font-size: 1.5rem;
      }
    }

    /* Loading state */
    .btn-login.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-login.loading::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      margin-left: 0.5rem;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- Left Panel -->
  <div class="login-left">
    <div class="left-wrapper">
      <div class="brand-logo">
        <div class="brand-icon">U</div>
        <span class="brand-name">Undroba Co.</span>
      </div>

      <div class="left-content">
        <p class="left-subtitle">Bienvenido de vuelta</p>
        <h1 class="left-title">
          Accede a tu <span>panel de control</span> para gestionar tu tienda
        </h1>
        <p class="left-description">
          Administra productos, órdenes, inventario y más desde un solo lugar.
        </p>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="login-right">
    <div class="login-wrapper">
      <form class="login-form" id="loginForm">
        <div class="login-header">
          <div class="login-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
          </div>
          <h2 class="login-title">Iniciar Sesión</h2>
          <p class="login-subtitle">Ingresa tus credenciales para acceder al panel de administración</p>
        </div>

        <div class="login-error" id="loginError"></div>

        <div class="form-group">
          <label class="form-label" for="loginEmail">Correo Electrónico</label>
          <input 
            type="email" 
            id="loginEmail" 
            class="form-input" 
            placeholder="tu@email.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Contraseña</label>
          <div class="form-input-wrapper">
            <input 
              type="password" 
              id="loginPassword" 
              class="form-input" 
              placeholder="••••••••"
              required
              autocomplete="current-password"
            >
            <button type="button" class="toggle-password" id="togglePassword" title="Mostrar contraseña">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          Iniciar Sesión
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('loginPassword');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
        this.title = 'Ocultar contraseña';
      } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
        this.title = 'Mostrar contraseña';
      }
    });

    // Login functionality
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const submitBtn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('loginError');
      
      // Loading state
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'Iniciando sesión...';
      errorDiv.classList.remove('show');
      
      try {
        // Check if supabase is available
        if (typeof supabase !== 'undefined') {
          const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
          });
          
          if (error) throw error;
          
          // Check if user is admin
          const isAdmin = email === 'admin@undrobaco.com' || email === 'alejandro@example.com';
          
          // Store session
          localStorage.setItem('sb-session', JSON.stringify({
            ...data.session,
            isAdmin: isAdmin
          }));
          
          // Redirect
          if (isAdmin) {
            window.location.href = 'admin/index.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          // Fallback for demo
          console.log('Supabase not available - demo mode');
          
          // Simulate login for demo
          setTimeout(() => {
            localStorage.setItem('sb-session', JSON.stringify({
              isAdmin: true,
              email: email
            }));
            window.location.href = 'admin/index.html';
          }, 1000);
        }
      } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = error.message || 'Error al iniciar sesión. Verifica tus credenciales.';
        errorDiv.classList.add('show');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'Iniciar Sesión';
      }
    });
  </script>
</body>
</html>
