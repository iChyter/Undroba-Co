<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Undroba Co.</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Settings</h1>
      </div>
      
      <div class="admin-card">
        <div class="admin-form">
          <div class="form-row">
            <div class="form-group">
              <label>Store Name</label>
              <input type="text" value="Undroba Co.">
            </div>
            <div class="form-group">
              <label>WhatsApp Number</label>
              <input type="text" value="5491161747070">
            </div>
          </div>
          <div class="form-group">
            <label>Currency</label>
            <select>
              <option value="ARS">ARS - Argentine Peso</option>
              <option value="USD">USD - US Dollar</option>
            </select>
          </div>
          <button type="button" class="btn-add-variant">Save Settings</button>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="admin-sidebar.js"></script>
  <script>
    const AdminConfig = {
      init() {
        this.checkAuth();
      },
      checkAuth() {
        const sessionStr = localStorage.getItem('sb-session');
        if (!sessionStr) window.location.href = '../login.html';
        try {
          const sessionData = JSON.parse(sessionStr);
          if (!sessionData?.isAdmin) window.location.href = '../login.html';
        } catch (e) { window.location.href = '../login.html'; }
      }
    };
    AdminSidebar.render('configuracion');
    AdminConfig.init();
  </script>
</body>
</html>
