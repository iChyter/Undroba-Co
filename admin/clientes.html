<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - Undroba Co.</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Customers</h1>
      </div>
      
      <div class="admin-card">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <h3>No customers yet</h3>
          <p>Customers will appear here when they create accounts.</p>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="admin-sidebar.js"></script>
  <script>
    const AdminClientes = {
      init() {
        this.checkAuth();
      },
      checkAuth() {
        const sessionStr = localStorage.getItem('sb-session');
        if (!sessionStr) window.location.href = '../login.html';
        try {
          const sessionData = JSON.parse(sessionStr);
          if (!sessionData?.isAdmin) window.location.href = '../login.html';
        } catch (e) { window.location.href = '../login.html'; }
      }
    };
    AdminSidebar.render('dashboard');
    AdminClientes.init();
  </script>
</body>
</html>
