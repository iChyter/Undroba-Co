<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Configuración - Undroba Co.</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <main class="admin-main">
      <div class="admin-card">
        <div class="admin-form">
          <div class="form-row">
            <div class="form-group">
              <label style="color: rgba(255,255,255,0.7);">Nombre de la Tienda</label>
              <input type="text" value="Undroba Co." style="background: #111; border-color: #333; color: #fff;">
            </div>
            <div class="form-group">
              <label style="color: rgba(255,255,255,0.7);">Número de WhatsApp</label>
              <input type="text" value="5491161747070" style="background: #111; border-color: #333; color: #fff;">
            </div>
          </div>
          <div class="form-group">
            <label style="color: rgba(255,255,255,0.7);">Moneda</label>
            <select style="background: #111; border-color: #333; color: #fff;">
              <option value="ARS">ARS - Peso Argentino</option>
              <option value="USD">USD - Dólar Estadounidense</option>
            </select>
          </div>
          <button type="button" class="btn-primary">Guardar Configuración</button>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="admin-sidebar.js"></script>
  <script>
    const AdminConfig = {
      init() {
        this.checkAuth();
      },
      checkAuth() {
        const sessionStr = localStorage.getItem('sb-session');
        if (!sessionStr) window.location.href = '../login.html';
        try {
          const sessionData = JSON.parse(sessionStr);
          if (!sessionData?.isAdmin) window.location.href = '../login.html';
        } catch (e) { window.location.href = '../login.html'; }
      }
    };
    AdminSidebar.render('configuracion');
    AdminConfig.init();
  </script>
</body>
</html>
