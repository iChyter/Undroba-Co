<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Undroba Co.</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Orders</h1>
      </div>
      
      <div class="admin-card">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          </svg>
          <h3>No orders yet</h3>
          <p>Orders will appear here when customers make purchases via WhatsApp.</p>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="admin-sidebar.js"></script>
  <script>
    const AdminOrdenes = {
      init() {
        this.checkAuth();
      },
      checkAuth() {
        const sessionStr = localStorage.getItem('sb-session');
        if (!sessionStr) window.location.href = '../login.html';
        try {
          const sessionData = JSON.parse(sessionStr);
          if (!sessionData?.isAdmin) window.location.href = '../login.html';
        } catch (e) { window.location.href = '../login.html'; }
      }
    };
    AdminSidebar.render('pedidos');
    AdminOrdenes.init();
  </script>
</body>
</html>
