<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja - Undroba Co.</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>Caja</h1>
        <div class="admin-header-actions">
          <button class="btn-primary" onclick="AdminCaja.openMovimientoModal()">+ Nuevo Movimiento</button>
        </div>
      </div>

      <div class="caja-stats">
        <div class="caja-stat-card">
          <span class="caja-stat-label">Saldo Actual</span>
          <span class="caja-stat-value" id="saldoActual">$0.00</span>
        </div>
        <div class="caja-stat-card">
          <span class="caja-stat-label">Ingresos (Mes)</span>
          <span class="caja-stat-value positive" id="ingresosMes">$0.00</span>
        </div>
        <div class="caja-stat-card">
          <span class="caja-stat-label">Gastos (Mes)</span>
          <span class="caja-stat-value negative" id="gastosMes">$0.00</span>
        </div>
      </div>

      <div class="filters-bar">
        <select id="filterTipo" class="filter-select">
          <option value="">Todos los tipos</option>
          <option value="ingreso">Ingreso</option>
          <option value="gasto">Gasto</option>
        </select>
        <input type="month" id="filterMes" class="filter-select" value="">
      </div>
      
      <div class="admin-card">
        <div class="movimientos-list" id="movimientosList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Nuevo Movimiento -->
  <div class="modal" id="movimientoModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Nuevo Movimiento</h2>
        <button class="modal-close" onclick="AdminCaja.closeMovimientoModal()">&times;</button>
      </div>
      <form id="movimientoForm" class="modal-form">
        <div class="form-group">
          <label for="movimientoTipo">Tipo</label>
          <select id="movimientoTipo" name="tipo" required>
            <option value="ingreso">Ingreso</option>
            <option value="gasto">Gasto</option>
          </select>
        </div>
        <div class="form-group">
          <label for="movimientoMonto">Monto ($)</label>
          <input type="number" id="movimientoMonto" name="monto" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="movimientoFecha">Fecha</label>
          <input type="date" id="movimientoFecha" name="fecha" required>
        </div>
        <div class="form-group">
          <label for="movimientoCategoria">Categoría</label>
          <select id="movimientoCategoria" name="categoria" required>
            <option value="venta">Venta</option>
            <option value="gasto_proveedor">Gasto Proveedor</option>
            <option value="gasto_envio">Gasto Envío</option>
            <option value="gasto_operativo">Gasto Operativo</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label for="movimientoDescripcion">Descripción</label>
          <input type="text" id="movimientoDescripcion" name="descripcion" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="AdminCaja.closeMovimientoModal()">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="admin-sidebar.js"></script>
  <script src="admin-caja.js"></script>
  <script>
    AdminSidebar.render('caja');
    AdminCaja.init();
  </script>
</body>
</html>
