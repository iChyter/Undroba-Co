<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Órdenes - Undroba Co.</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
  <style>
    /* Estilos específicos para órdenes */
    .stats-row-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 1024px) {
      .stats-row-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .stats-row-grid {
        grid-template-columns: 1fr;
      }
    }

    .filters-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-select {
      background: #111;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.625rem 1rem;
      color: #fff;
      font-size: 0.875rem;
      min-width: 150px;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
    }

    .search-box input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.625rem 1rem 0.625rem 2.5rem;
      color: #fff;
      font-size: 0.875rem;
    }

    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1rem;
    }

    @media (max-width: 768px) {
      .orders-grid {
        grid-template-columns: 1fr;
      }
    }

    .order-card {
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 5px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .order-card:hover {
      border-color: #333;
      transform: translateY(-2px);
    }

    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .order-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .order-id {
      font-weight: 600;
      color: #fff;
      font-size: 0.9375rem;
    }

    .order-date {
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.5);
    }

    .order-card-body {
      margin-bottom: 1rem;
    }

    .order-client {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .client-avatar {
      width: 36px;
      height: 36px;
      background: #E53935;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #fff;
      font-size: 0.875rem;
    }

    .client-info {
      display: flex;
      flex-direction: column;
    }

    .client-name {
      font-weight: 500;
      color: #fff;
      font-size: 0.875rem;
    }

    .client-contact {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }

    .order-products-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .product-tag {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
    }

    .product-tag.more {
      background: #E53935;
      border-color: #E53935;
      color: #fff;
    }

    .order-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.75rem;
      border-top: 1px solid #222;
    }

    .order-total {
      font-weight: 700;
      color: #fff;
      font-size: 1.125rem;
    }

    .btn-view {
      background: transparent;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.375rem 0.75rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-view:hover {
      border-color: #E53935;
      color: #E53935;
    }

    /* Status pills */
    .status-pill {
      padding: 0.25rem 0.625rem;
      border-radius: 20px;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-pill.pending {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }

    .status-pill.processing {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .status-pill.completed {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }

    .status-pill.cancelled {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 5px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem;
      border-bottom: 1px solid #222;
    }

    .modal-header h2 {
      color: #fff;
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
    }

    .modal-date {
      color: rgba(255,255,255,0.5);
      font-size: 0.8125rem;
    }

    .modal-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
    }

    .modal-close:hover {
      color: #fff;
    }

    .modal-body {
      padding: 1.25rem;
    }

    .order-section {
      margin-bottom: 1.5rem;
    }

    .order-section h3 {
      color: rgba(255,255,255,0.7);
      font-size: 0.8125rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .client-detail {
      display: flex;
      gap: 1rem;
    }

    .client-avatar.large {
      width: 48px;
      height: 48px;
      font-size: 1.125rem;
    }

    .client-detail-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .detail-row {
      display: flex;
      gap: 0.5rem;
    }

    .detail-label {
      color: rgba(255,255,255,0.5);
      font-size: 0.8125rem;
      min-width: 80px;
    }

    .detail-value {
      color: #fff;
      font-size: 0.8125rem;
    }

    .products-list-detail {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .product-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.625rem;
      background: #111;
      border-radius: 3px;
    }

    .product-info {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .product-name {
      color: #fff;
      font-size: 0.875rem;
    }

    .product-qty {
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
    }

    .product-price {
      color: #fff;
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .order-total-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.75rem;
      border-top: 1px solid #222;
    }

    .total-label {
      color: rgba(255,255,255,0.5);
      font-size: 0.875rem;
    }

    .total-value {
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .order-actions {
      display: flex;
      gap: 0.75rem;
      padding-top: 1rem;
      border-top: 1px solid #222;
    }

    .order-actions .btn-primary,
    .order-actions .btn-secondary {
      flex: 1;
      padding: 0.75rem;
      border-radius: 5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 0.875rem;
    }

    .order-actions .btn-primary {
      background: #E53935;
      color: #fff;
    }

    .order-actions .btn-primary:hover {
      background: #ff5252;
    }

    .order-actions .btn-secondary {
      background: transparent;
      border: 1px solid #333;
      color: rgba(255,255,255,0.7);
    }

    .order-actions .btn-secondary:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: rgba(255,255,255,0.5);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .empty-state h3 {
      color: #fff;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <main class="admin-main">
      <!-- Stats Cards -->
      <div class="stats-row-grid">
        <div class="stat-card-premium">
          <div class="card-top">
            <div class="card-label">Total</div>
          </div>
          <div class="card-bottom">
            <p class="label">Órdenes Totales</p>
            <div class="value-row">
              <h2 id="stat-total">0</h2>
            </div>
          </div>
        </div>
        
        <div class="stat-card-premium">
          <div class="card-top">
            <div class="card-label" style="color: #f59e0b; border-color: rgba(245, 158, 11, 0.3);">Pendientes</div>
          </div>
          <div class="card-bottom">
            <p class="label">Por Procesar</p>
            <div class="value-row">
              <h2 id="stat-pendientes" style="color: #f59e0b;">0</h2>
            </div>
          </div>
        </div>
        
        <div class="stat-card-premium">
          <div class="card-top">
            <div class="card-label" style="color: #3b82f6; border-color: rgba(59, 130, 246, 0.3);">En Proceso</div>
          </div>
          <div class="card-bottom">
            <p class="label">Procesando</p>
            <div class="value-row">
              <h2 id="stat-procesando" style="color: #3b82f6;">0</h2>
            </div>
          </div>
        </div>
        
        <div class="stat-card-premium">
          <div class="card-top">
            <div class="card-label" style="color: #10b981; border-color: rgba(16, 185, 129, 0.3);">Completadas</div>
          </div>
          <div class="card-bottom">
            <p class="label">Finalizadas</p>
            <div class="value-row">
              <h2 id="stat-completadas" style="color: #10b981;">0</h2>
            </div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <select id="filterEstado" class="filter-select">
          <option value="">Todos los estados</option>
          <option value="pendiente">Pendiente</option>
          <option value="procesando">Procesando</option>
          <option value="completada">Completada</option>
          <option value="cancelada">Cancelada</option>
        </select>
        <input type="date" id="filterFecha" class="filter-select" style="max-width: 150px;">
        <div class="search-box">
          <input type="text" id="searchOrders" placeholder="Buscar por cliente, email o número de orden...">
        </div>
      </div>
      
      <!-- Orders Grid -->
      <div class="orders-grid" id="ordersList">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          </svg>
          <h3>Sin órdenes</h3>
          <p>Las órdenes aparecerán aquí cuando los clientes realicen compras vía WhatsApp.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal" id="orderModal">
    <div class="modal-content" id="orderModalContent">
      <!-- Content will be dynamically inserted here -->
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="admin-sidebar.js"></script>
  <script src="admin-ordenes.js"></script>
  <script>
    AdminSidebar.render('ordenes');
    AdminOrdenes.init();
  </script>
</body>
</html>
