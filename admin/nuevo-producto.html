<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nuevo Producto - Undroba Co.</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <main class="admin-main">
      <a href="productos.html" class="btn-secondary" style="text-decoration: none; margin-bottom: 1.5rem; display: inline-block; background: transparent; border: 1px solid #333; color: #fff; padding: 0.625rem 1rem; border-radius: 5px;">← Volver a Productos</a>
      
      <div class="admin-card">
        <form class="admin-form" id="productForm">
          <div class="form-row">
            <div class="form-group">
              <label style="color: rgba(255,255,255,0.7);">Nombre</label>
              <input type="text" id="productName" required style="background: #111; border-color: #333; color: #fff;">
            </div>
            <div class="form-group">
              <label style="color: rgba(255,255,255,0.7);">Precio</label>
              <input type="number" id="productPrice" required min="0" style="background: #111; border-color: #333; color: #fff;">
            </div>
          </div>

          <div class="form-group">
            <label style="color: rgba(255,255,255,0.7);">Descripción</label>
            <textarea id="productDesc" placeholder="Detalles del producto..." style="background: #111; border-color: #333; color: #fff;"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label style="color: rgba(255,255,255,0.7);">Categoría</label>
              <select id="productCategoria" required style="background: #111; border-color: #333; color: #fff;">
                <option value="">Seleccionar...</option>
                <option value="sueter">Suéter</option>
                <option value="sudadera">Sudadera</option>
                <option value="camiseta">Camiseta</option>
                <option value="pantalon">Pantalón</option>
                <option value="short">Short</option>
                <option value="zapatos">Zapatos</option>
              </select>
            </div>
            <div class="form-group">
              <label style="color: rgba(255,255,255,0.7);">Género</label>
              <select id="productGenero" required style="background: #111; border-color: #333; color: #fff;">
                <option value="">Seleccionar...</option>
                <option value="hombre">Hombre</option>
                <option value="mujer">Mujer</option>
                <option value="unisex">Unisex</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label style="color: rgba(255,255,255,0.7);">Imágenes</label>
            <div class="image-upload-area" id="imageUploadArea" style="border-color: #333; background: #111;">
              <input type="file" class="image-upload-input" id="imageInput" accept="image/*" multiple>
              <div class="image-upload-icon">📷</div>
              <p class="image-upload-text" style="color: rgba(255,255,255,0.5);">Clic o arrastra imágenes aquí<br>Se convertirán a WebP automáticamente</p>
            </div>
            <div class="image-preview-grid" id="imagePreview"></div>
          </div>

          <div class="variants-section" style="border-color: #333;">
            <h4 class="variants-title" style="color: #fff;">Colores y Tallas (Existencias)</h4>
            <div id="variantsContainer">
              <div class="variant-color" data-color-index="0" style="border-color: #333;">
                <div class="variant-color-header">
                  <input type="color" class="color-input" value="#000000">
                  <input type="text" class="color-name-input" placeholder="Nombre del color" value="Negro" style="background: #111; border-color: #333; color: #fff;">
                </div>
                <div class="variant-tallas">
                  <div class="variant-tallas-grid">
                    <div class="variant-talla"><span>S</span><input type="number" placeholder="0" min="0" data-talla="S" style="background: #111; border-color: #333; color: #fff;"></div>
                    <div class="variant-talla"><span>M</span><input type="number" placeholder="0" min="0" data-talla="M" style="background: #111; border-color: #333; color: #fff;"></div>
                    <div class="variant-talla"><span>L</span><input type="number" placeholder="0" min="0" data-talla="L" style="background: #111; border-color: #333; color: #fff;"></div>
                    <div class="variant-talla"><span>XL</span><input type="number" placeholder="0" min="0" data-talla="XL" style="background: #111; border-color: #333; color: #fff;"></div>
                  </div>
                </div>
              </div>
            </div>
            <button type="button" class="btn-add-color" id="addColorBtn" style="background: #111; border-color: #333; color: #fff;">+ Añadir Color</button>
          </div>

          <button type="submit" class="btn-primary">Crear Producto</button>
        </form>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/imagenes.js"></script>
  <script src="admin-sidebar.js"></script>
  <script src="admin-nuevo.js"></script>
  <script>
    AdminSidebar.render('productos');
    AdminNuevo.init();
  </script>
</body>
</html>
